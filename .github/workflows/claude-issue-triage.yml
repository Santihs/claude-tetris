name: Claude Issue Triage

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Issue Triage
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Analiza el issue #${{ github.event.issue.number }} de este repositorio.
            1. Asigná los labels apropiados de entre los labels existentes del repo
               (usá `gh issue edit ${{ github.event.issue.number }} --add-label "..."`).
            2. Publicá un comentario en el issue con un diagnóstico general del
               problema: causa probable, archivos/áreas del código afectadas,
               y qué se necesitaría para resolverlo. No escribas ni propongas
               código todavía, solo diagnóstico.
               El comentario tiene que estar en formato MarkDown que GitHub
               pueda entender.
          claude_args: |
            --allowed-tools "Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh issue view:*),Bash(gh label list:*),Bash(gh api:*)"
